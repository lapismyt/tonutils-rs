name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  crates-io:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component clippy,rustfmt
          rustup default stable

      - name: Validate release tag and crate version
        shell: bash
        run: |
          if [[ -z "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "CRATES_IO_TOKEN repository secret is required."
            exit 1
          fi

          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "tonutils") | .version')"
          expected_tag="v${version}"
          release_tag="${{ github.event.release.tag_name }}"

          if [[ "$release_tag" != "v1.0.0" ]]; then
            echo "Release tag must be v1.0.0 for this release workflow."
            exit 1
          fi

          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "Release tag $release_tag does not match tonutils package version $version."
            exit 1
          fi

      - name: Verify workspace and macro package
        run: |
          cargo fmt --check
          cargo check --features full
          cargo test --features full
          cargo clippy --features full -- -D warnings
          cargo package -p tonutils-macros

      - name: Publish tonutils-macros
        run: cargo publish -p tonutils-macros

      - name: Verify tonutils package
        shell: bash
        run: |
          for attempt in {1..12}; do
            if cargo package -p tonutils; then
              exit 0
            fi
            echo "tonutils-macros is not visible in the crates.io index yet; retrying in 10 seconds..."
            sleep 10
          done
          exit 1

      - name: Publish tonutils
        run: cargo publish -p tonutils
